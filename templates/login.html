<!-- templates/login.html -->
{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl mb-4">Login</h2>

    {% if error %}
        <p class="text-red-500">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input name="username" placeholder="Username" class="w-full p-2 border mb-3">
        <input name="password" type="password" placeholder="Password" class="w-full p-2 border mb-3">
        <button class="bg-blue-500 text-white px-4 py-2 rounded w-full">Login</button>
    </form>

    <p class="mt-3">No account? <a href="/register/" class="text-blue-500">Register</a></p>
</div>
{% endblock %}
